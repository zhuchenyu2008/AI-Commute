services:
  migrate:
    build: .
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/commute.db
    volumes:
      - ./data:/app/data
    restart: "no"

  web:
    build: .
    command: sh -c "npm run start"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/commute.db
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    build: .
    command: sh -c "while true; do npm run scheduler:tick; sleep 60; done"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/commute.db
    volumes:
      - ./data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully

  telegram:
    build: .
    command: >
      sh -c 'if [ -z "$$TELEGRAM_BOT_TOKEN" ]; then echo "TELEGRAM_BOT_TOKEN is not configured; keeping Telegram worker idle."; sleep infinity; else npm run telegram:poll; fi'
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/commute.db
    volumes:
      - ./data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
